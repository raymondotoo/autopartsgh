services:
  - type: web
    name: autoparts-hub-api
    env: node
    rootDir: server
    plan: starter
    buildCommand: npm install && npm run prisma:generate && npm run prisma:migrate && npm run seed
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: autoparts-hub-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        value: https://YOUR-FRONTEND-DOMAIN
      - key: CLOUDINARY_CLOUD_NAME
        value: ""
      - key: CLOUDINARY_API_KEY
        value: ""
      - key: CLOUDINARY_API_SECRET
        value: ""
      - key: CLOUDINARY_FOLDER
        value: autoparts-hub
      - key: FLUTTERWAVE_SECRET_KEY
        value: ""
      - key: FLUTTERWAVE_PUBLIC_KEY
        value: ""
      - key: FLUTTERWAVE_WEBHOOK_HASH
        value: ""

databases:
  - name: autoparts-hub-db
    plan: starter
